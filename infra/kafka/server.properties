# KRaft mode — these settings override the base image defaults.
# Broker-specific values (node.id, listeners, etc.) are supplied via env vars.

# Exactly-once delivery requirements
transaction.state.log.replication.factor=3
transaction.state.log.min.isr=2
offsets.topic.replication.factor=3
offsets.topic.num.partitions=50

# Prevent data loss on leader failure
unclean.leader.election.enable=false
min.insync.replicas=2
default.replication.factor=3

# Partition count for billing.events — must equal max ingestion replicas
# so each pod can own exactly one partition. Tuned in provisioning step.
num.partitions=64

# I/O tuning
num.network.threads=8
num.io.threads=16
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# Log retention
log.retention.hours=168
log.segment.bytes=1073741824
log.retention.check.interval.ms=300000

# Producer / consumer visibility window for exactly-once
# Consumers reading billing.events must set isolation.level=read_committed
log.message.timestamp.type=CreateTime

# JMX metrics (scraped by Prometheus kafka-jmx-exporter sidecar)
# Pass -Dcom.sun.jmx.remote.port=9999 in KAFKA_JVM_PERFORMANCE_OPTS
