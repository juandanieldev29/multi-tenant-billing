apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "billing.fullname" . }}-billing-api
  labels:
    {{- include "billing.labels" . | nindent 4 }}
    app.kubernetes.io/component: billing-api
spec:
  replicas: {{ .Values.billingApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "billing.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: billing-api
  template:
    metadata:
      labels:
        {{- include "billing.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: billing-api
    spec:
      containers:
        - name: billing-api
          image: "{{ .Values.registry }}/billing-api:{{ .Values.tag }}"
          imagePullPolicy: {{ .Values.billingApi.image.pullPolicy }}
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "billing.fullname" . }}-db-secret
                  key: url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.billingApi.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
          livenessProbe:
            httpGet: {path: /healthz, port: 8081}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: /healthz, port: 8081}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.billingApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "billing.fullname" . }}-billing-api
spec:
  selector:
    {{- include "billing.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: billing-api
  ports:
    - port: 8081
      targetPort: 8081
